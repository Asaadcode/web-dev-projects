<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Facebook Clone</h2>
    <button onclick="logout()">Logout</button>
</div>

<!-- WELCOME -->
<div class="welcome">
    <h3 id="userName">Welcome User</h3>
</div>

<!-- POST CARD -->
<div class="card">

    <p id="postText" class="text">
        This is a Facebook-style post created using HTML, CSS, and JavaScript.
        Initially only part of this text is visible. When you click "See more",
        the full content will be shown. This demonstrates DOM manipulation and
        interactive UI behavior using JavaScript.
    </p>

    <span id="toggleBtn">See more</span>

</div>

<script src="home.js"></script>
</body>
</html>
